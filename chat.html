<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#131110">
    <title>Cloak</title>
    <link rel="stylesheet" href="cloak.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script>
        if(localStorage.getItem('cloak_dark')!=='0') document.documentElement.classList.add('dark');
        (function(){var t=localStorage.getItem('cloak_theme')||'default';document.documentElement.setAttribute('data-theme',t);})();
    </script>
    <style>
        /* DROPDOWN NEOBRUTALIST */
        .model-picker {
            position: relative;
            display: inline-block;
        }
        .model-btn {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 16px;
            background: var(--surf);
            border: var(--bd);
            box-shadow: var(--shsm);
            cursor: pointer;
            transition: all 0.2s var(--spring);
            font-family: var(--fd);
            text-transform: uppercase;
            font-weight: 800;
            font-size: 11px;
            letter-spacing: 0.1em;
        }
        .model-btn:hover {
            transform: translate(-2px, -2px);
            box-shadow: var(--sh);
        }
        .model-dropdown {
            position: absolute;
            top: calc(100% + 8px);
            left: 0;
            background: var(--paper);
            border: var(--bd);
            box-shadow: var(--shlg);
            min-width: 240px;
            z-index: 1000;
            opacity: 0;
            transform: translateY(10px) scale(0.95);
            pointer-events: none;
            transition: all 0.3s var(--spring);
        }
        .model-picker:hover .model-dropdown {
            opacity: 1;
            transform: translateY(0) scale(1);
            pointer-events: auto;
        }
        .model-opt {
            padding: 12px 16px;
            border-bottom: var(--bdt);
            cursor: pointer;
            transition: background 0.2s;
        }
        .model-opt:last-child { border-bottom: none; }
        .model-opt:hover { background: var(--p2); }
        .model-opt.active { background: var(--ink); color: var(--paper); }
        .model-opt-name {
            display: block;
            font-family: var(--fd);
            font-weight: 800;
            font-size: 12px;
            text-transform: uppercase;
        }
        .model-opt-desc {
            display: block;
            font-size: 10px;
            opacity: 0.6;
            margin-top: 2px;
            text-transform: none;
            letter-spacing: 0;
        }

        /* TASK LIST TOOL */
        .task-list {
            margin: 16px 0;
            border: var(--bd);
            background: var(--surf);
            box-shadow: var(--shsm);
        }
        .task-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 14px;
            border-bottom: var(--bdt);
            transition: background 0.3s;
        }
        .task-item:last-child { border-bottom: none; }
        .task-checkbox {
            width: 18px;
            height: 18px;
            border: var(--bd);
            background: var(--paper);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .task-checkbox.done { background: var(--acc); }
        .task-checkbox.done::after {
            content: '✓';
            color: white;
            font-size: 12px;
            font-weight: 900;
        }
        .task-text {
            font-size: 13px;
            font-weight: 500;
        }
        .task-item.done .task-text {
            text-decoration: line-through;
            opacity: 0.5;
        }
        .task-item.active { background: var(--p2); border-left: 4px solid var(--acc); }

        /* PROGRESS PROGRESSION (CLAUDE STYLE) */
        .progress-wrap {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 12px;
            animation: fadeUp 0.4s ease;
        }
        .progress-step {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 12px;
            font-weight: 600;
            color: var(--ink);
            opacity: 0.4;
            transition: opacity 0.3s;
        }
        .progress-step.active { opacity: 1; }
        .progress-step.done { opacity: 0.7; color: var(--grn); }
        .progress-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: currentColor;
        }
        .progress-step.active .progress-dot { animation: pdot 1.5s infinite; }

        /* ERROR MASKING */
        .error-cloak {
            background: var(--p2);
            border: var(--bd);
            padding: 16px;
            color: var(--ink);
            font-size: 13px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .error-cloak-icon { color: var(--acc); font-size: 18px; }
    </style>
</head>
<body>
    <div id="s-chat" class="active">
        <div class="topbar">
            <div class="topbar-left">
                <button class="icon-btn" onclick="toggleSidebar()">☰</button>
                <div class="model-picker">
                    <div class="model-btn">
                        <span id="current-model-name">Pneuma</span>
                        <svg width="10" height="6" viewBox="0 0 10 6" fill="none"><path d="M1 1L5 5L9 1" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                    </div>
                    <div class="model-dropdown">
                        <div class="model-opt active" onclick="selectModel('pneuma', 'Pneuma', 'Fast & responsive for daily tasks')">
                            <span class="model-opt-name">Pneuma</span>
                            <span class="model-opt-desc">Fast & responsive for daily tasks</span>
                        </div>
                        <div class="model-opt" onclick="selectModel('logos', 'Logos', 'Reasoning & complex problem solving')">
                            <span class="model-opt-name">Logos</span>
                            <span class="model-opt-desc">Reasoning & complex problem solving</span>
                        </div>
                        <div class="model-opt" onclick="selectModel('kairos', 'Kairos', 'Deep creative & long-context tasks')">
                            <span class="model-opt-name">Kairos</span>
                            <span class="model-opt-desc">Deep creative & long-context tasks</span>
                        </div>
                    </div>
                </div>
            </div>
            <div class="topbar-right">
                <button class="icon-btn" onclick="toggleDark()">
                    <span class="moon">🌙</span>
                    <span class="sun">☀️</span>
                </button>
            </div>
        </div>
        
        <div class="chat-shell">
            <div class="main">
                <div id="chat-area" class="chat-area">
                    <div id="empty-state" class="empty">
                        <div class="empty-inner">
                            <h1 class="empty-greeting" id="empty-greeting">Hey there!</h1>
                            <p class="empty-slogan">A human resource, not a companion.</p>
                            <div class="chip-row">
                                <button class="chip" onclick="chipSend('Explain quantum physics simply')">Explain simply</button>
                                <button class="chip" onclick="chipSend('Help me write a professional email')">Write & edit</button>
                                <button class="chip" onclick="chipSend('Debug this Python function')">Debug code</button>
                            </div>
                        </div>
                    </div>
                    <div id="messages" class="messages" style="display:none"></div>
                </div>

                <div class="input-area">
                    <div class="input-wrap">
                        <div id="hw-label" class="hw-label">
                            <span>Homework mode</span>
                            <button class="hw-label-x" onclick="toggleHwMode()">×</button>
                        </div>
                        <div class="input-box">
                            <button class="plus-btn" onclick="togglePlusMenu(event)">+</button>
                            <textarea id="chat-input" class="chat-input" placeholder="Say something..." rows="1" oninput="onInput(this)" onkeydown="onKey(event)"></textarea>
                            <button id="send-btn" class="send-btn" disabled onclick="send()">➔</button>
                        </div>
                        <div class="input-foot">
                            <span class="input-sub">Enter to send · Shift+Enter for new line</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="cloak.js"></script>
    <script>
        // REDESIGN LOGIC
        function selectModel(id, name, desc) {
            cloakModel = id;
            document.getElementById('current-model-name').textContent = name;
            document.querySelectorAll('.model-opt').forEach(opt => {
                opt.classList.toggle('active', opt.querySelector('.model-opt-name').textContent === name);
            });
        }

        // TASK LIST COMPONENT
        function createTaskUI(tasks) {
            const container = document.createElement('div');
            container.className = 'task-list';
            tasks.forEach((task, i) => {
                const item = document.createElement('div');
                item.className = 'task-item' + (i === 0 ? ' active' : '');
                item.innerHTML = `
                    <div class="task-checkbox"></div>
                    <div class="task-text">${task}</div>
                `;
                container.appendChild(item);
            });
            return container;
        }

        // PROGRESS COMPONENT
        function createProgressUI(steps) {
            const wrap = document.createElement('div');
            wrap.className = 'progress-wrap';
            steps.forEach((step, i) => {
                const div = document.createElement('div');
                div.className = 'progress-step' + (i === 0 ? ' active' : '');
                div.innerHTML = `<div class="progress-dot"></div><span>${step}</span>`;
                wrap.appendChild(div);
            });
            return wrap;
        }

        // ERROR MASKING
        const originalCallback = window.cloakSendMessage;
        window.cloakSendMessage = async function(text, cb) {
            const maskedCb = (res, err) => {
                if (err && (err.includes('Groq direct') || err.includes('400'))) {
                    const errorHtml = `
                        <div class="error-cloak">
                            <span class="error-cloak-icon">⚠</span>
                            <span>Cloak ran into an issue and misgenerated a response. Please append your prompt and try again.</span>
                        </div>
                    `;
                    cb(errorHtml, null);
                } else {
                    cb(res, err);
                }
            };
            return originalCallback(text, maskedCb);
        };
    </script>
</body>
</html>
