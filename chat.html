<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chat — Cloak</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300..600&display=swap" rel="stylesheet">
  <style>
    /* ── Design Tokens ── */
    :root, [data-theme="light"] {
      --color-bg:              #f7f6f2;
      --color-surface:         #f9f8f5;
      --color-surface-2:       #fbfbf9;
      --color-surface-offset:  #f0ede8;
      --color-surface-dynamic: #e6e4df;
      --color-divider:         #dcd9d5;
      --color-border:          #d4d1ca;
      --color-text:            #28251d;
      --color-text-muted:      #7a7974;
      --color-text-faint:      #bab9b4;
      --color-text-inverse:    #f9f8f4;
      --color-primary:         #01696f;
      --color-primary-hover:   #0c4e54;
      --color-primary-active:  #0f3638;
      --color-primary-highlight: #cedcd8;
      --color-error:           #a12c7b;
      --color-shadow-sm:       0 1px 2px oklch(0.2 0.01 80 / 0.06);
      --color-shadow-md:       0 4px 12px oklch(0.2 0.01 80 / 0.08);
      --color-shadow-lg:       0 12px 32px oklch(0.2 0.01 80 / 0.12);
      --radius-sm:   0.375rem;
      --radius-md:   0.5rem;
      --radius-lg:   0.75rem;
      --radius-xl:   1rem;
      --radius-full: 9999px;
      --space-1:  0.25rem;
      --space-2:  0.5rem;
      --space-3:  0.75rem;
      --space-4:  1rem;
      --space-5:  1.25rem;
      --space-6:  1.5rem;
      --space-8:  2rem;
      --space-10: 2.5rem;
      --space-12: 3rem;
      --text-xs:   clamp(0.75rem,  0.7rem  + 0.25vw, 0.875rem);
      --text-sm:   clamp(0.875rem, 0.8rem  + 0.35vw, 1rem);
      --text-base: clamp(1rem,     0.95rem + 0.25vw, 1.125rem);
      --text-lg:   clamp(1.125rem, 1rem    + 0.75vw, 1.5rem);
      --text-xl:   clamp(1.5rem,   1.2rem  + 1.25vw, 2.25rem);
      --font-display: 'Instrument Serif', Georgia, serif;
      --font-body:    'DM Sans', 'Helvetica Neue', sans-serif;
      --transition:   180ms cubic-bezier(0.16, 1, 0.3, 1);
    }

    [data-theme="dark"] {
      --color-bg:              #171614;
      --color-surface:         #1c1b19;
      --color-surface-2:       #201f1d;
      --color-surface-offset:  #1d1c1a;
      --color-surface-dynamic: #2d2c2a;
      --color-divider:         #262523;
      --color-border:          #393836;
      --color-text:            #cdccca;
      --color-text-muted:      #797876;
      --color-text-faint:      #5a5957;
      --color-text-inverse:    #2b2a28;
      --color-primary:         #4f98a3;
      --color-primary-hover:   #227f8b;
      --color-primary-active:  #1a626b;
      --color-primary-highlight: #313b3b;
      --color-error:           #d163a7;
      --color-shadow-sm:       0 1px 2px oklch(0 0 0 / 0.2);
      --color-shadow-md:       0 4px 12px oklch(0 0 0 / 0.3);
      --color-shadow-lg:       0 12px 32px oklch(0 0 0 / 0.4);
    }

    @media (prefers-color-scheme: dark) {
      :root:not([data-theme]) {
        --color-bg:              #171614;
        --color-surface:         #1c1b19;
        --color-surface-2:       #201f1d;
        --color-surface-offset:  #1d1c1a;
        --color-surface-dynamic: #2d2c2a;
        --color-divider:         #262523;
        --color-border:          #393836;
        --color-text:            #cdccca;
        --color-text-muted:      #797876;
        --color-text-faint:      #5a5957;
        --color-text-inverse:    #2b2a28;
        --color-primary:         #4f98a3;
        --color-primary-hover:   #227f8b;
        --color-primary-active:  #1a626b;
        --color-primary-highlight: #313b3b;
        --color-error:           #d163a7;
        --color-shadow-sm:       0 1px 2px oklch(0 0 0 / 0.2);
        --color-shadow-md:       0 4px 12px oklch(0 0 0 / 0.3);
        --color-shadow-lg:       0 12px 32px oklch(0 0 0 / 0.4);
      }
    }

    /* ── Base Reset ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html {
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
      height: 100%;
    }
    body {
      height: 100%;
      font-family: var(--font-body);
      font-size: var(--text-base);
      color: var(--color-text);
      background: var(--color-bg);
      display: flex;
      flex-direction: column;
    }
    button { cursor: pointer; background: none; border: none; font: inherit; color: inherit; }
    input, textarea, select { font: inherit; color: inherit; }
    ::selection { background: oklch(from var(--color-primary) l c h / 0.2); color: var(--color-text); }
    :focus-visible { outline: 2px solid var(--color-primary); outline-offset: 3px; border-radius: var(--radius-sm); }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
    }

    /* ── Layout Shell ── */
    .app {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      max-width: 800px;
      margin: 0 auto;
      width: 100%;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: var(--space-4) var(--space-6);
      border-bottom: 1px solid var(--color-divider);
      background: var(--color-surface);
      flex-shrink: 0;
      gap: var(--space-4);
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      min-width: 0;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      text-decoration: none;
      color: var(--color-text);
      flex-shrink: 0;
    }

    .logo-mark {
      width: 28px;
      height: 28px;
    }

    .logo-name {
      font-family: var(--font-display);
      font-size: var(--text-lg);
      line-height: 1;
      color: var(--color-text);
    }

    .header-divider {
      width: 1px;
      height: 20px;
      background: var(--color-border);
      flex-shrink: 0;
    }

    /* ── Model Selector ── */
    .model-select-wrap {
      position: relative;
      display: flex;
      align-items: center;
    }

    .model-select {
      appearance: none;
      -webkit-appearance: none;
      background: transparent;
      border: 1px solid var(--color-border);
      border-radius: var(--radius-full);
      padding: var(--space-1) var(--space-8) var(--space-1) var(--space-3);
      font-size: var(--text-xs);
      font-weight: 500;
      color: var(--color-text-muted);
      cursor: pointer;
      transition: border-color var(--transition), color var(--transition), background var(--transition);
      min-width: 0;
    }

    .model-select:hover {
      border-color: var(--color-primary);
      color: var(--color-primary);
    }

    .model-select:focus-visible {
      outline: 2px solid var(--color-primary);
      outline-offset: 2px;
    }

    .model-select-icon {
      position: absolute;
      right: var(--space-3);
      pointer-events: none;
      color: var(--color-text-faint);
      display: flex;
      align-items: center;
    }

    /* ── Header Actions ── */
    .header-actions {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      flex-shrink: 0;
    }

    .icon-btn {
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: var(--radius-md);
      color: var(--color-text-muted);
      transition: background var(--transition), color var(--transition);
    }

    .icon-btn:hover {
      background: var(--color-surface-offset);
      color: var(--color-text);
    }

    /* ── Messages Area ── */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: var(--space-8) var(--space-6);
      display: flex;
      flex-direction: column;
      gap: var(--space-6);
      scroll-behavior: smooth;
    }

    .messages::-webkit-scrollbar { width: 6px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: var(--color-border); border-radius: var(--radius-full); }

    /* ── Empty State ── */
    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: var(--space-12) var(--space-8);
      gap: var(--space-4);
      color: var(--color-text-muted);
      animation: fadeIn 0.4s ease;
    }

    .empty-state-icon {
      width: 48px;
      height: 48px;
      color: var(--color-text-faint);
    }

    .empty-state h2 {
      font-family: var(--font-display);
      font-size: var(--text-xl);
      color: var(--color-text);
      font-weight: 400;
    }

    .empty-state p {
      font-size: var(--text-sm);
      color: var(--color-text-muted);
      max-width: 36ch;
    }

    .suggestion-chips {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-2);
      justify-content: center;
      margin-top: var(--space-2);
    }

    .chip {
      padding: var(--space-2) var(--space-4);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-full);
      font-size: var(--text-xs);
      color: var(--color-text-muted);
      cursor: pointer;
      transition: background var(--transition), border-color var(--transition), color var(--transition);
      background: var(--color-surface);
    }

    .chip:hover {
      border-color: var(--color-primary);
      color: var(--color-primary);
      background: var(--color-primary-highlight);
    }

    /* ── Message Bubbles ── */
    .message {
      display: flex;
      gap: var(--space-3);
      animation: slideUp 0.25s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .message.user {
      flex-direction: row-reverse;
    }

    .avatar {
      width: 32px;
      height: 32px;
      border-radius: var(--radius-full);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: var(--text-xs);
      font-weight: 600;
      margin-top: 2px;
    }

    .avatar.assistant-avatar {
      background: var(--color-primary-highlight);
      color: var(--color-primary);
    }

    .avatar.user-avatar {
      background: var(--color-surface-dynamic);
      color: var(--color-text-muted);
    }

    .bubble {
      max-width: 72%;
      padding: var(--space-3) var(--space-4);
      border-radius: var(--radius-xl);
      font-size: var(--text-sm);
      line-height: 1.7;
      word-break: break-word;
    }

    .message.assistant .bubble {
      background: var(--color-surface);
      border: 1px solid var(--color-divider);
      border-bottom-left-radius: var(--radius-sm);
      color: var(--color-text);
    }

    .message.user .bubble {
      background: var(--color-primary);
      color: var(--color-text-inverse);
      border-bottom-right-radius: var(--radius-sm);
    }

    /* Markdown-ish formatting inside bubbles */
    .bubble p + p { margin-top: var(--space-3); }
    .bubble code {
      font-family: 'Fira Code', 'Courier New', monospace;
      font-size: 0.9em;
      background: oklch(from var(--color-text) l c h / 0.08);
      padding: 0.1em 0.35em;
      border-radius: var(--radius-sm);
    }
    .bubble pre {
      background: var(--color-surface-offset);
      border-radius: var(--radius-md);
      padding: var(--space-4);
      overflow-x: auto;
      margin-top: var(--space-3);
    }
    .bubble pre code { background: none; padding: 0; }
    .bubble ul, .bubble ol { padding-left: var(--space-5); margin-top: var(--space-2); }
    .bubble li + li { margin-top: var(--space-1); }
    .bubble strong { font-weight: 600; }
    .bubble em { font-style: italic; }

    /* ── Typing Indicator ── */
    .typing-indicator {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      animation: slideUp 0.25s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .typing-dots {
      display: flex;
      gap: 4px;
      padding: var(--space-3) var(--space-4);
      background: var(--color-surface);
      border: 1px solid var(--color-divider);
      border-radius: var(--radius-xl);
      border-bottom-left-radius: var(--radius-sm);
    }

    .typing-dots span {
      width: 6px;
      height: 6px;
      border-radius: var(--radius-full);
      background: var(--color-text-faint);
      animation: bounce 1.2s ease-in-out infinite;
    }

    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

    /* ── Input Area ── */
    .input-area {
      padding: var(--space-4) var(--space-6) var(--space-5);
      border-top: 1px solid var(--color-divider);
      background: var(--color-surface);
      flex-shrink: 0;
    }

    .input-wrap {
      display: flex;
      align-items: flex-end;
      gap: var(--space-3);
      background: var(--color-surface-2);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-xl);
      padding: var(--space-3) var(--space-3) var(--space-3) var(--space-4);
      transition: border-color var(--transition), box-shadow var(--transition);
    }

    .input-wrap:focus-within {
      border-color: var(--color-primary);
      box-shadow: 0 0 0 3px oklch(from var(--color-primary) l c h / 0.12);
    }

    .chat-input {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      resize: none;
      font-size: var(--text-sm);
      color: var(--color-text);
      line-height: 1.6;
      max-height: 160px;
      min-height: 24px;
      overflow-y: auto;
    }

    .chat-input::placeholder { color: var(--color-text-faint); }

    .chat-input::-webkit-scrollbar { width: 4px; }
    .chat-input::-webkit-scrollbar-thumb { background: var(--color-border); border-radius: var(--radius-full); }

    .send-btn {
      width: 36px;
      height: 36px;
      border-radius: var(--radius-lg);
      background: var(--color-primary);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background var(--transition), transform var(--transition);
    }

    .send-btn:hover:not(:disabled) { background: var(--color-primary-hover); transform: scale(1.04); }
    .send-btn:active:not(:disabled) { background: var(--color-primary-active); transform: scale(0.97); }
    .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .input-hint {
      font-size: var(--text-xs);
      color: var(--color-text-faint);
      text-align: center;
      margin-top: var(--space-2);
    }

    /* ── Error banner ── */
    .error-banner {
      margin: 0 var(--space-6);
      padding: var(--space-3) var(--space-4);
      background: oklch(from var(--color-error) l c h / 0.08);
      border: 1px solid oklch(from var(--color-error) l c h / 0.25);
      border-radius: var(--radius-md);
      font-size: var(--text-xs);
      color: var(--color-error);
      display: none;
    }

    .error-banner.visible { display: block; }

    /* ── Animations ── */
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); }
      40%           { transform: translateY(-5px); }
    }

    /* ── Mobile ── */
    @media (max-width: 600px) {
      .header { padding: var(--space-3) var(--space-4); }
      .messages { padding: var(--space-6) var(--space-4); }
      .input-area { padding: var(--space-3) var(--space-4) var(--space-4); }
      .bubble { max-width: 88%; }
      .logo-name { display: none; }
    }
  </style>
</head>
<body>

<div class="app">

  <!-- Header -->
  <header class="header">
    <div class="header-left">
      <a href="index.html" class="logo" aria-label="Cloak home">
        <!-- Inline SVG logo mark -->
        <svg class="logo-mark" viewBox="0 0 28 28" fill="none" aria-hidden="true">
          <rect width="28" height="28" rx="7" fill="var(--color-primary)" opacity="0.12"/>
          <path d="M8 14c0-3.314 2.686-6 6-6s6 2.686 6 6" stroke="var(--color-primary)" stroke-width="2.2" stroke-linecap="round"/>
          <circle cx="14" cy="14" r="2.5" fill="var(--color-primary)"/>
          <path d="M14 16.5V20" stroke="var(--color-primary)" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <span class="logo-name">Cloak</span>
      </a>

      <div class="header-divider" aria-hidden="true"></div>

      <!-- Model Selector -->
      <div class="model-select-wrap">
        <select class="model-select" id="modelSelect" aria-label="Select model">
          <option value="dynamic" selected>⚡ Dynamic</option>
          <optgroup label="Anthropic">
            <option value="claude-3-5-haiku-20241022">Claude 3.5 Haiku</option>
            <option value="claude-3-5-sonnet-20241022">Claude 3.5 Sonnet</option>
            <option value="claude-opus-4-5">Claude Opus 4.5</option>
          </optgroup>
          <optgroup label="OpenAI">
            <option value="gpt-4o-mini">GPT-4o Mini</option>
            <option value="gpt-4o">GPT-4o</option>
            <option value="o3-mini">o3 Mini</option>
            <option value="o4-mini">o4 Mini</option>
          </optgroup>
          <optgroup label="Google">
            <option value="gemini-2.0-flash">Gemini 2.0 Flash</option>
            <option value="gemini-2.5-pro-preview-03-25">Gemini 2.5 Pro</option>
          </optgroup>
          <optgroup label="Meta">
            <option value="meta-llama/llama-4-scout">Llama 4 Scout</option>
            <option value="meta-llama/llama-4-maverick">Llama 4 Maverick</option>
          </optgroup>
        </select>
        <span class="model-select-icon" aria-hidden="true">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
            <path d="M2.5 4.5L6 8l3.5-3.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </span>
      </div>
    </div>

    <div class="header-actions">
      <!-- New chat -->
      <button class="icon-btn" id="newChatBtn" title="New chat" aria-label="New chat">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 5v14M5 12h14"/>
        </svg>
      </button>

      <!-- Theme toggle -->
      <button class="icon-btn" id="themeToggle" data-theme-toggle aria-label="Toggle theme">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- Messages -->
  <main class="messages" id="messages" role="log" aria-live="polite" aria-label="Chat messages">
    <!-- Empty state rendered by JS -->
  </main>

  <!-- Error Banner -->
  <div class="error-banner" id="errorBanner" role="alert"></div>

  <!-- Input Area -->
  <div class="input-area">
    <div class="input-wrap">
      <textarea
        class="chat-input"
        id="chatInput"
        placeholder="Message Cloak…"
        rows="1"
        aria-label="Message input"
        autocomplete="off"
        spellcheck="true"
      ></textarea>
      <button class="send-btn" id="sendBtn" disabled aria-label="Send message">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M5 12h14M12 5l7 7-7 7"/>
        </svg>
      </button>
    </div>
    <p class="input-hint">Enter to send · Shift+Enter for new line</p>
  </div>

</div>

<script>
(function () {
  'use strict';

  /* ── Config ── */
  const CLOAK_API_URL = '/api/chat'; // Cloak API endpoint — all requests route here
  const DYNAMIC_MODEL = 'dynamic';   // sentinel: let Cloak pick the fastest model

  /* ── State ── */
  let messages = [];   // { role: 'user'|'assistant', content: string }[]
  let isStreaming = false;

  /* ── Elements ── */
  const messagesEl  = document.getElementById('messages');
  const inputEl     = document.getElementById('chatInput');
  const sendBtn     = document.getElementById('sendBtn');
  const modelSelect = document.getElementById('modelSelect');
  const newChatBtn  = document.getElementById('newChatBtn');
  const errorBanner = document.getElementById('errorBanner');

  /* ── Theme toggle ── */
  (function initTheme() {
    const html = document.documentElement;
    const btn  = document.getElementById('themeToggle');
    let theme  = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
    html.setAttribute('data-theme', theme);
    updateThemeIcon(btn, theme);

    btn.addEventListener('click', () => {
      theme = theme === 'dark' ? 'light' : 'dark';
      html.setAttribute('data-theme', theme);
      updateThemeIcon(btn, theme);
    });
  })();

  function updateThemeIcon(btn, theme) {
    btn.innerHTML = theme === 'dark'
      ? `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>`
      : `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>`;
    btn.setAttribute('aria-label', `Switch to ${theme === 'dark' ? 'light' : 'dark'} mode`);
  }

  /* ── Textarea auto-resize ── */
  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 160) + 'px';
    sendBtn.disabled = inputEl.value.trim() === '' || isStreaming;
  });

  /* ── Enter key handling ── */
  inputEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      if (!sendBtn.disabled) handleSend();
    }
  });

  sendBtn.addEventListener('click', handleSend);
  newChatBtn.addEventListener('click', resetChat);

  /* ── Empty state ── */
  function renderEmptyState() {
    messagesEl.innerHTML = `
      <div class="empty-state">
        <svg class="empty-state-icon" viewBox="0 0 48 48" fill="none" aria-hidden="true">
          <circle cx="24" cy="24" r="20" stroke="currentColor" stroke-width="2" opacity="0.3"/>
          <path d="M16 24c0-4.418 3.582-8 8-8s8 3.582 8 8" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
          <circle cx="24" cy="24" r="3.5" fill="currentColor" opacity="0.5"/>
          <path d="M24 27.5V32" stroke="currentColor" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
        </svg>
        <h2>What can I help with?</h2>
        <p>Ask anything — Cloak routes your message to the best available model.</p>
        <div class="suggestion-chips">
          <button class="chip" data-prompt="Explain quantum computing in simple terms">Explain quantum computing</button>
          <button class="chip" data-prompt="Write a short poem about the ocean">Write a poem</button>
          <button class="chip" data-prompt="Help me debug this JavaScript function">Debug JavaScript</button>
          <button class="chip" data-prompt="Summarize the key principles of good design">Design principles</button>
        </div>
      </div>
    `;

    messagesEl.querySelectorAll('.chip').forEach(chip => {
      chip.addEventListener('click', () => {
        inputEl.value = chip.dataset.prompt;
        inputEl.dispatchEvent(new Event('input'));
        inputEl.focus();
      });
    });
  }

  /* ── Escape HTML ── */
  function escHtml(str) {
    return str
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  /* ── Simple markdown → HTML ── */
  function renderMarkdown(text) {
    let html = escHtml(text);
    // Code blocks
    html = html.replace(/```[\w]*\n?([\s\S]*?)```/g, '<pre><code>$1</code></pre>');
    // Inline code
    html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
    // Bold
    html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
    // Italic
    html = html.replace(/\*([^*]+)\*/g, '<em>$1</em>');
    // Unordered lists
    html = html.replace(/^[-*] (.+)$/gm, '<li>$1</li>');
    html = html.replace(/(<li>.*<\/li>\n?)+/gs, '<ul>$&</ul>');
    // Ordered lists
    html = html.replace(/^\d+\. (.+)$/gm, '<li>$1</li>');
    // Paragraphs (split on double newlines)
    html = html
      .split(/\n{2,}/)
      .map(block => block.trim())
      .filter(Boolean)
      .map(block => {
        if (block.startsWith('<ul>') || block.startsWith('<ol>') || block.startsWith('<pre>')) return block;
        if (block.startsWith('<li>')) return `<ul>${block}</ul>`;
        return `<p>${block.replace(/\n/g, '<br>')}</p>`;
      })
      .join('\n');
    return html;
  }

  /* ── Append a message bubble ── */
  function appendMessage(role, content) {
    // Remove empty state if present
    const emptyState = messagesEl.querySelector('.empty-state');
    if (emptyState) emptyState.remove();

    const isUser = role === 'user';
    const initials = isUser ? 'You' : 'AI';

    const msgEl = document.createElement('div');
    msgEl.className = `message ${role}`;
    msgEl.innerHTML = `
      <div class="avatar ${isUser ? 'user-avatar' : 'assistant-avatar'}" aria-hidden="true">${initials}</div>
      <div class="bubble">${isUser ? `<p>${escHtml(content)}</p>` : renderMarkdown(content)}</div>
    `;
    messagesEl.appendChild(msgEl);
    scrollToBottom();
    return msgEl;
  }

  /* ── Typing indicator ── */
  function showTyping() {
    const el = document.createElement('div');
    el.className = 'typing-indicator';
    el.id = 'typingIndicator';
    el.innerHTML = `
      <div class="avatar assistant-avatar" aria-hidden="true">AI</div>
      <div class="typing-dots" aria-label="Cloak is typing">
        <span></span><span></span><span></span>
      </div>
    `;
    messagesEl.appendChild(el);
    scrollToBottom();
  }

  function removeTyping() {
    const el = document.getElementById('typingIndicator');
    if (el) el.remove();
  }

  /* ── Scroll ── */
  function scrollToBottom() {
    messagesEl.scrollTo({ top: messagesEl.scrollHeight, behavior: 'smooth' });
  }

  /* ── Error ── */
  function showError(msg) {
    errorBanner.textContent = msg;
    errorBanner.classList.add('visible');
    setTimeout(() => errorBanner.classList.remove('visible'), 5000);
  }

  /* ── Send ── */
  async function handleSend() {
    const text = inputEl.value.trim();
    if (!text || isStreaming) return;

    // Clear input
    inputEl.value = '';
    inputEl.style.height = 'auto';
    sendBtn.disabled = true;

    // Add user message
    messages.push({ role: 'user', content: text });
    appendMessage('user', text);

    // Start streaming
    isStreaming = true;
    showTyping();

    const selectedModel = modelSelect.value;

    try {
      const payload = {
        messages: messages.map(m => ({ role: m.role, content: m.content })),
        stream: true,
      };

      // Attach model only when not dynamic (let Cloak default to fastest)
      if (selectedModel !== DYNAMIC_MODEL) {
        payload.model = selectedModel;
      }

      const res = await fetch(CLOAK_API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });

      if (!res.ok) {
        const errData = await res.json().catch(() => ({}));
        throw new Error(errData.error || `API error ${res.status}`);
      }

      removeTyping();

      // Stream response
      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let assistantText = '';
      const msgEl = appendMessage('assistant', '');
      const bubbleEl = msgEl.querySelector('.bubble');

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        const chunk = decoder.decode(value, { stream: true });
        const lines = chunk.split('\n');

        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          const data = line.slice(6).trim();
          if (data === '[DONE]') continue;

          try {
            const json = JSON.parse(data);
            const delta = json.choices?.[0]?.delta?.content ?? json.delta?.text ?? '';
            if (delta) {
              assistantText += delta;
              bubbleEl.innerHTML = renderMarkdown(assistantText);
              scrollToBottom();
            }
          } catch {
            // non-JSON line, skip
          }
        }
      }

      if (assistantText) {
        messages.push({ role: 'assistant', content: assistantText });
      }

    } catch (err) {
      removeTyping();
      showError(err.message || 'Something went wrong. Please try again.');
      // Remove the user message from state if we failed
      messages.pop();
      // Remove the user bubble
      const bubbles = messagesEl.querySelectorAll('.message.user');
      if (bubbles.length) bubbles[bubbles.length - 1].remove();
      if (messages.length === 0) renderEmptyState();
    } finally {
      isStreaming = false;
      sendBtn.disabled = inputEl.value.trim() === '';
    }
  }

  /* ── Reset ── */
  function resetChat() {
    messages = [];
    messagesEl.innerHTML = '';
    renderEmptyState();
    inputEl.value = '';
    inputEl.style.height = 'auto';
    sendBtn.disabled = true;
    inputEl.focus();
  }

  /* ── Init ── */
  renderEmptyState();
  inputEl.focus();

})();
</script>
</body>
</html>
