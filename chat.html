<script>
let selectedAgent = 'pneuma';

function selectAgent(agent) {
  selectedAgent = agent;
  document.querySelectorAll('.agent-btn').forEach(btn => {
    btn.style.borderColor = btn.dataset.agent === agent ? 'var(--acc)' : 'var(--bd)';
    btn.style.fontWeight = btn.dataset.agent === agent ? '600' : '400';
  });
  document.querySelector('#selected-agent span').textContent = agent.charAt(0).toUpperCase() + agent.slice(1);
}

// Override the send function to call api.usecloak.org
const originalSend = window.send;
window.send = async function() {
  const inp = document.getElementById('chat-input');
  const userMsg = inp.value.trim();
  if (!userMsg || busy) return;
  
  setBusy(true);
  showMessages();
  addMsg('user', userMsg);
  hist.push({ role: 'USER', message: userMsg });
  inp.value = '';
  onInput(inp);
  
  try {
    const response = await fetch('https://api.usecloak.org/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        agent: selectedAgent,
        message: userMsg,
        history: hist
      })
    });
    
    const data = await response.json();
    const botMsg = addMsg('bot', '', false);
    const botContent = botMsg.querySelector('.bot-content');
    streamContent(botContent, data.response, () => {
      setBusy(false);
      hist.push({ role: 'ASSISTANT', message: data.response });
    });
  } catch (error) {
    console.error('Chat error:', error);
    addMsg('bot', 'Sorry, I encountered an error. Please try again.');
    setBusy(false);
  }
};
</script>
